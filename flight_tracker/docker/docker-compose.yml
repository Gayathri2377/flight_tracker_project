version: "3.9"

services:

  # ── FastAPI ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: flight_api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Pipeline (ingestion + processing) ────────────────────────────────────
  pipeline:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: flight_pipeline
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    command: ["python", "pipeline/run_pipeline.py"]
    restart: unless-stopped
    depends_on:
      - api

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: flight_grafana
    ports:
      - "3000:3000"
    volumes:
      - ../data/warehouse:/data/warehouse:ro
      - ../dashboards/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ../dashboards/grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ../dashboards/grafana/dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=flighttracker123
      - GF_INSTALL_PLUGINS=frser-sqlite-datasource
      - GF_AUTH_ANONYMOUS_ENABLED=true
    restart: unless-stopped

volumes:
  grafana_data:
